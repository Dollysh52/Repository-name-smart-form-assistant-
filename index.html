<!DOCTYPE html>
<html>
<head>

<title>Smart Form Assistant Chatbot</title>

<link rel="stylesheet" href="static/style.css">
<script src="static/script.js"></script>
  
</head>

<body>

<h1>Smart Government Form Chatbot</h1>



<select onchange="changeLanguage(this.value)">
<option value="en">English</option>
<option value="hi">हिंदी</option>
<option value="hr">Haryanvi</option>
</select>

<div id="chat-container"></div>

<input type="text" id="user-input" placeholder="Ask about form help">

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤 Speak</button>

</div>
